name: SEO Daily — sitemap + IndexNow

on:
  schedule:
    # 매일 KST 02:00 (UTC 17:00 전일)
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seo-daily
  cancel-in-progress: false

jobs:
  bump-and-ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump sitemap/feed lastmod (KST)
        run: node scripts/update-sitemap-lastmod.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain public/sitemap.xml public/feed.xml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/sitemap.xml public/feed.xml
            git commit -m "chore(seo): bump sitemap/feed lastmod ($(TZ=Asia/Seoul date +%Y-%m-%d))"
            git push
          else
            echo "no changes"
          fi

      - name: Ping IndexNow + Google
        run: node scripts/ping-indexnow.mjs
