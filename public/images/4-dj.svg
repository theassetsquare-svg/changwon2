  <!-- laser beams -->
  <path d="M0,420 L600,560 L1200,420 L1200,440 L600,580 L0,440 Z" fill="url(#laserPink)" opacity="0.55"/>
  <path d="M0,460 L600,600 L1200,460 L1200,480 L600,620 L0,480 Z" fill="url(#laserViolet)" opacity="0.4"/>

  <!-- DJ booth front desk -->
  <rect x="280" y="560" width="640" height="220" fill="#15081e" stroke="#3a1f54" stroke-width="2"/>
  <rect x="280" y="560" width="640" height="20" fill="#1a0a26"/>
  <!-- LED strip on front -->
  <rect x="290" y="585" width="620" height="6" fill="#ff2ea6"/>
  <rect x="290" y="595" width="620" height="6" fill="#7c4dff" opacity="0.7"/>

  <!-- CDJ left -->
  <g>
    <rect x="320" y="610" width="160" height="120" rx="10" fill="#0b0410" stroke="#7c4dff" stroke-width="2"/>
    <circle cx="400" cy="670" r="44" fill="#15081e" stroke="#b9a8d3" stroke-width="2"/>
    <circle cx="400" cy="670" r="14" fill="#ff2ea6"/>
    <rect x="330" y="710" width="140" height="8" fill="#1a0a26"/>
  </g>

  <!-- mixer center -->
  <g>
    <rect x="510" y="610" width="180" height="120" rx="8" fill="#0b0410" stroke="#ffd166" stroke-width="2"/>
    <g fill="#ffd166">
      <rect x="525" y="630" width="14" height="6"/>
      <rect x="525" y="650" width="14" height="6"/>
      <rect x="525" y="670" width="14" height="6"/>
