      <rect x="396" y="290" width="6" height="70"/>
      <rect x="408" y="310" width="6" height="50"/>
      <rect x="420" y="320" width="6" height="40"/>
      <rect x="432" y="295" width="6" height="65"/>
      <rect x="444" y="305" width="6" height="55"/>
      <rect x="456" y="315" width="6" height="45"/>
      <rect x="468" y="300" width="6" height="60"/>
      <rect x="480" y="290" width="6" height="70"/>
      <rect x="492" y="310" width="6" height="50"/>
      <rect x="504" y="320" width="6" height="40"/>
      <rect x="516" y="305" width="6" height="55"/>
      <rect x="528" y="295" width="6" height="65"/>
      <rect x="540" y="310" width="6" height="50"/>
      <rect x="552" y="315" width="6" height="45"/>
      <rect x="564" y="320" width="6" height="40"/>
      <rect x="576" y="300" width="6" height="60"/>
      <rect x="588" y="290" width="6" height="70"/>
      <rect x="600" y="310" width="6" height="50"/>
      <rect x="612" y="305" width="6" height="55"/>
      <rect x="624" y="295" width="6" height="65"/>
      <rect x="636" y="320" width="6" height="40"/>
      <rect x="648" y="310" width="6" height="50"/>
      <rect x="660" y="300" width="6" height="60"/>
      <rect x="672" y="295" width="6" height="65"/>
