    <g fill="#1a0a26" stroke="#b9a8d3">
      <rect x="555" y="630" width="8" height="80"/>
      <rect x="575" y="630" width="8" height="80"/>
      <rect x="595" y="630" width="8" height="80"/>
      <rect x="615" y="630" width="8" height="80"/>
      <rect x="635" y="630" width="8" height="80"/>
    </g>
    <g fill="#ff2ea6">
      <rect x="553" y="660" width="12" height="6"/>
      <rect x="573" y="650" width="12" height="6"/>
      <rect x="593" y="670" width="12" height="6"/>
      <rect x="613" y="655" width="12" height="6"/>
      <rect x="633" y="665" width="12" height="6"/>
    </g>
