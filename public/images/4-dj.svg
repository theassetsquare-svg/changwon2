  <!-- CDJ right -->
  <g>
    <rect x="720" y="610" width="160" height="120" rx="10" fill="#0b0410" stroke="#7c4dff" stroke-width="2"/>
    <circle cx="800" cy="670" r="44" fill="#15081e" stroke="#b9a8d3" stroke-width="2"/>
    <circle cx="800" cy="670" r="14" fill="#7c4dff"/>
    <rect x="730" y="710" width="140" height="8" fill="#1a0a26"/>
  </g>

  <!-- headphones silhouette -->
  <g fill="none" stroke="#ffd166" stroke-width="4" stroke-linecap="round">
    <path d="M180,750 Q220,700 270,750"/>
    <circle cx="180" cy="765" r="18" fill="#1a0a26"/>
    <circle cx="270" cy="765" r="18" fill="#1a0a26"/>
  </g>

  <!-- header text -->
  <g filter="url(#glowD)">
    <text x="600" y="850" text-anchor="middle" fill="#ff77c8" font-family="Arial Black, sans-serif" font-size="22" letter-spacing="8" font-weight="900">DJ BOOTH</text>
  </g>
</svg>
