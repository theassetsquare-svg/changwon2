      <rect x="696" y="320" width="6" height="40"/>
      <rect x="708" y="305" width="6" height="55"/>
      <rect x="720" y="300" width="6" height="60"/>
      <rect x="732" y="290" width="6" height="70"/>
      <rect x="744" y="310" width="6" height="50"/>
      <rect x="756" y="320" width="6" height="40"/>
      <rect x="768" y="305" width="6" height="55"/>
      <rect x="780" y="295" width="6" height="65"/>
      <rect x="792" y="310" width="6" height="50"/>
      <rect x="804" y="320" width="6" height="40"/>
      <rect x="816" y="300" width="6" height="60"/>
      <rect x="828" y="290" width="6" height="70"/>
      <rect x="840" y="310" width="6" height="50"/>
      <rect x="852" y="320" width="6" height="40"/>
      <rect x="864" y="305" width="6" height="55"/>
      <rect x="876" y="295" width="6" height="65"/>
      <rect x="888" y="310" width="6" height="50"/>
      <rect x="900" y="320" width="6" height="40"/>
      <rect x="912" y="305" width="6" height="55"/>
      <rect x="924" y="300" width="6" height="60"/>
