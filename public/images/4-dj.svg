<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="창원 룰루랄라 나이트 DJ 부스">
  <defs>
    <linearGradient id="bgDJ" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c0d2b"/>
      <stop offset="1" stop-color="#0b0410"/>
    </linearGradient>
    <radialGradient id="laserPink" cx="0.5" cy="0" r="0.8">
      <stop offset="0" stop-color="#ff2ea6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ff2ea6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="laserViolet" cx="0.5" cy="0" r="0.8">
      <stop offset="0" stop-color="#7c4dff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7c4dff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowD" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bgDJ)"/>

  <!-- back wall LED video panel -->
  <rect x="120" y="80" width="960" height="320" fill="#0e0617" stroke="#3a1f54" stroke-width="3"/>
  <g>
    <text x="600" y="200" text-anchor="middle" fill="#ff2ea6" font-family="Arial Black, sans-serif" font-size="68" letter-spacing="14" font-weight="900" filter="url(#glowD)">RULULALA</text>
    <text x="600" y="260" text-anchor="middle" fill="#ffd166" font-family="Arial, sans-serif" font-size="22" letter-spacing="10">LIVE · TONIGHT</text>
    <!-- waveform -->
    <g fill="#7c4dff" opacity="0.85">
      <rect x="180" y="320" width="6" height="40"/>
      <rect x="192" y="305" width="6" height="55"/>
      <rect x="204" y="295" width="6" height="65"/>
      <rect x="216" y="315" width="6" height="45"/>
      <rect x="228" y="300" width="6" height="60"/>
      <rect x="240" y="290" width="6" height="70"/>
      <rect x="252" y="310" width="6" height="50"/>
      <rect x="264" y="320" width="6" height="40"/>
      <rect x="276" y="300" width="6" height="60"/>
      <rect x="288" y="290" width="6" height="70"/>
      <rect x="300" y="310" width="6" height="50"/>
      <rect x="312" y="305" width="6" height="55"/>
      <rect x="324" y="320" width="6" height="40"/>
      <rect x="336" y="295" width="6" height="65"/>
      <rect x="348" y="300" width="6" height="60"/>
      <rect x="360" y="310" width="6" height="50"/>
