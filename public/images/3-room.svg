<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="창원 룰루랄라 나이트 프라이빗 룸">
  <defs>
    <linearGradient id="wallR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c0d2b"/>
      <stop offset="1" stop-color="#0b0410"/>
    </linearGradient>
    <linearGradient id="sofa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a1fbf"/>
      <stop offset="1" stop-color="#2a0f6b"/>
    </linearGradient>
    <radialGradient id="ledStrip" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff2ea6"/>
      <stop offset="1" stop-color="#7c4dff" stop-opacity="0.2"/>
    </radialGradient>
    <filter id="glowR" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#wallR)"/>

  <!-- back wall LED strips -->
  <g filter="url(#glowR)">
    <rect x="100" y="120" width="1000" height="6" fill="url(#ledStrip)"/>
    <rect x="100" y="180" width="1000" height="6" fill="url(#ledStrip)" opacity="0.7"/>
    <rect x="100" y="240" width="1000" height="6" fill="url(#ledStrip)" opacity="0.4"/>
  </g>

  <!-- wall pattern (diamond) -->
  <g stroke="#3a1f54" fill="none">
    <polygon points="300,400 360,440 300,480 240,440"/>
    <polygon points="420,400 480,440 420,480 360,440"/>
    <polygon points="540,400 600,440 540,480 480,440"/>
    <polygon points="660,400 720,440 660,480 600,440"/>
    <polygon points="780,400 840,440 780,480 720,440"/>
    <polygon points="900,400 960,440 900,480 840,440"/>
  </g>

  <!-- back sofa -->
  <rect x="120" y="500" width="960" height="120" rx="40" fill="url(#sofa)"/>
  <rect x="120" y="490" width="960" height="40" rx="20" fill="#5a2bdf"/>
  <!-- sofa stitching -->
  <g stroke="#1a0a26" stroke-width="2" fill="none">
    <line x1="300" y1="510" x2="300" y2="610"/>
    <line x1="500" y1="510" x2="500" y2="610"/>
    <line x1="700" y1="510" x2="700" y2="610"/>
    <line x1="900" y1="510" x2="900" y2="610"/>
  </g>

  <!-- table -->
  <ellipse cx="600" cy="780" rx="380" ry="40" fill="#1a0a26" stroke="#3a1f54" stroke-width="2"/>
  <ellipse cx="600" cy="760" rx="380" ry="40" fill="#15081e" stroke="#3a1f54" stroke-width="2"/>
  <rect x="220" y="760" width="760" height="20" fill="#15081e"/>

  <!-- bottle 1 -->
  <g>
    <rect x="430" y="640" width="36" height="120" rx="6" fill="#0e0617" stroke="#ffd166" stroke-width="2"/>
    <rect x="440" y="615" width="16" height="30" fill="#0e0617" stroke="#ffd166"/>
    <rect x="438" y="680" width="20" height="40" fill="#ffd166" opacity="0.85"/>
  </g>
  <!-- bottle 2 -->
  <g>
    <rect x="550" y="620" width="40" height="140" rx="6" fill="#0e0617" stroke="#ff2ea6" stroke-width="2"/>
    <rect x="562" y="590" width="16" height="34" fill="#0e0617" stroke="#ff2ea6"/>
    <rect x="558" y="680" width="24" height="50" fill="#ff2ea6" opacity="0.7"/>
  </g>
  <!-- bottle 3 -->
  <g>
    <rect x="680" y="650" width="34" height="110" rx="5" fill="#0e0617" stroke="#7c4dff" stroke-width="2"/>
    <rect x="690" y="625" width="14" height="28" fill="#0e0617" stroke="#7c4dff"/>
    <rect x="688" y="690" width="18" height="38" fill="#7c4dff" opacity="0.7"/>
  </g>

  <!-- glasses -->
  <g fill="none" stroke="#b9a8d3" stroke-width="2">
    <path d="M340,720 L334,760 L378,760 L372,720 Z"/>
    <path d="M780,720 L774,760 L818,760 L812,720 Z"/>
    <path d="M860,720 L854,760 L898,760 L892,720 Z"/>
  </g>

  <!-- pendant light -->
  <line x1="600" y1="0" x2="600" y2="320" stroke="#3a1f54" stroke-width="2"/>
  <g filter="url(#glowR)">
    <circle cx="600" cy="340" r="36" fill="#ffd166" opacity="0.9"/>
  </g>

  <!-- header text -->
  <g filter="url(#glowR)">
    <text x="600" y="80" text-anchor="middle" fill="#ff77c8" font-family="Arial Black, sans-serif" font-size="26" letter-spacing="6" font-weight="900">PRIVATE ROOM</text>
  </g>
</svg>
